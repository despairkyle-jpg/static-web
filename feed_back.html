<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Submitted</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .check {
      font-size: 60px;
      color: #28a745;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      margin: 10px 0;
      color: #333;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="check">✔</div>
    <h1>Application Submitted Successfully!</h1>
    <p>Thank you for completing your online admission form.</p>
    <a href="#" class="btn" onclick="toindex()">Go to Dashboard</a>
    <Script>
        function toindex(){
            window.location.href="index.html";
        }
    </Script>
  </div>

</body>
</html>
