<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#bec6cd,#aeb5b5);
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    width:320px;
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0099ff;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login to your acount</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button onclick="login()" ondblclick="inside()">Login</button>

    <Script>
        function inside(){

        window.location.href="parent_portal.html"
        }
    </Script>

    <p id="message"></p>
</div>

<script>
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let message = document.getElementById("message");

  
    let correctUser = "admin";
    let correctPass = "12345";

    if(user === correctUser && pass === correctPass){
        message.style.color = "green";
        message.innerHTML = "Login Successful!";
    } else {
        message.style.color = "red";
        message.innerHTML = "Invalid Username or Password!";
    }
}
</script>

</body>
</html>
